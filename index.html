<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class threads</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
          "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@4.5.1/dist/vue-router.esm-browser.prod.js",
          "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
          "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
          "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
        }
      }
    </script>
    <script src="index.js" type="module"></script>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div id="app">loading...</div>
    <template id="shell-template">
      <div
        class="shell"
        v-if="routeName === 'login' || !$graffitiSession.value"
      >
        <p class="muted">
          login to see threads for <strong>6.4500 threads</strong>.
        </p>
        <button type="button" class="btn primary" @click="$graffiti.login()">
          login
        </button>
      </div>

      <div class="shell" v-else>
        <header class="top">
          <div class="top-nav">
            <div class="top-left">
              <button
                type="button"
                class="linkish top-logout"
                @click="$graffiti.logout($graffitiSession.value)"
              >
                logout
              </button>
              <button type="button" class="linkish" @click="goProfile">
                my profile
              </button>
            </div>
            <div class="top-title">
              <h1>6.4500 threads</h1>
              <p v-if="view === 'home'" class="sub"></p>
              <p v-else-if="view === 'create'" class="sub">create new thread</p>
              <p v-else-if="view === 'profile'" class="sub">
                {{myDisplayName}} profile
              </p>
              <p v-else-if="view === 'thread'" class="sub"></p>
            </div>
            <div class="top-right">
              <button
                v-if="view === 'home'"
                type="button"
                class="icon-btn plus"
                @click="goCreate"
                aria-label="New thread"
              >
                +
              </button>
              <button
                v-if="view !== 'home'"
                type="button"
                class="icon-btn icon-btn-img"
                @click="goHome"
                aria-label="Home"
              >
                <img
                  src="images/home.png"
                  alt=""
                  class="icon-btn__pic"
                  width="22"
                  height="22"
                />
              </button>
            </div>
          </div>
        </header>
        <router-view />
      </div>
    </template>
  </body>
</html>
